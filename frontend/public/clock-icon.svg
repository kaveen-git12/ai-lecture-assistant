<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Clock icon -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="currentColor" stroke-width="3"/>
  <circle cx="50" cy="50" r="30" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Clock hands -->
  <line x1="50" y1="50" x2="50" y2="25" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="65" y2="50" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="2.5" fill="currentColor"/>
</svg>
