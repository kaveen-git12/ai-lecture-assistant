<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Clock icon - larger and cleaner -->
  <g transform="translate(15, 15)">
    <circle cx="35" cy="35" r="32" fill="none" stroke="currentColor" stroke-width="3"/>
    <circle cx="35" cy="35" r="27" fill="none" stroke="currentColor" stroke-width="2"/>
    <!-- Hour hand -->
    <line x1="35" y1="35" x2="35" y2="15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Minute hand -->
    <line x1="35" y1="35" x2="50" y2="35" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="35" cy="35" r="3" fill="currentColor"/>
  </g>
</svg>
